<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    body {
      background: linear-gradient(to bottom, #091E3A, #2D9EE0, #2E8FE7, #FFFFFF);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }
    
    .settings-container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .dark-mode {
      background: linear-gradient(to bottom, #0a1929, #1a3a5f, #2c5282, #4a5568);
      color: #e2e8f0;
    }
    
    .dark-mode .settings-container {
      background: rgba(30, 41, 59, 0.9);
      color: #e2e8f0;
    }
    
    .dark-mode input,
    .dark-mode select {
      background-color: #374151;
      border-color: #4b5563;
      color: #e2e8f0;
    }
    
    .dark-mode .bg-green-600 {
      background-color: #059669;
    }
    
    .dark-mode .bg-green-600:hover {
      background-color: #047857;
    }
    
    .dark-mode .bg-blue-600 {
      background-color: #2563eb;
    }
    
    .dark-mode .bg-blue-600:hover {
      background-color: #1d4ed8;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #374151;
    }
    
    .dark-mode .form-group label {
      color: #e2e8f0;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .dark-mode .form-group input:focus,
    .dark-mode .form-group select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background-color: #059669;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #047857;
    }
    
    .btn-secondary {
      background-color: #2563eb;
      color: white;
    }
    
    .btn-secondary:hover {
      background-color: #1d4ed8;
    }
    
    .message {
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-weight: 500;
      text-align: center;
    }
    
    .message.success {
      background-color: #d1fae5;
      color: #065f46;
    }
    
    .dark-mode .message.success {
      background-color: #064e3b;
      color: #a7f3d0;
    }
    
    .message.error {
      background-color: #fee2e2;
      color: #991b1b;
    }
    
    .dark-mode .message.error {
      background-color: #7f1d1d;
      color: #fecaca;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="settings-container w-full max-w-2xl p-8">
    <h1 class="text-2xl font-bold mb-6 text-blue-800"><i class="fas fa-cog mr-2"></i>Settings</h1>

    <!-- Settings Form -->
    <form id="settingsForm">
      <!-- Password Section -->
      <div class="form-group">
        <label for="password" class="flex items-center">
          <i class="fas fa-lock mr-2"></i> Change Password
        </label>
        <input
          type="password"
          id="password"
          placeholder="Enter new password"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <div class="text-sm text-gray-500 mt-1">
          Password must be at least 8 characters with uppercase, lowercase, and numbers
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword" class="flex items-center">
          <i class="fas fa-lock mr-2"></i> Confirm Password
        </label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Notification Preferences -->
      <div class="form-group">
        <label for="notification" class="flex items-center">
          <i class="fas fa-bell mr-2"></i> Notification Preferences
        </label>
        <select
          id="notification"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="email">Email Only</option>
          <option value="sms">SMS Only</option>
          <option value="both">Email & SMS</option>
          <option value="none">None</option>
        </select>
      </div>

      <!-- Theme -->
      <div class="form-group">
        <label for="theme" class="flex items-center">
          <i class="fas fa-palette mr-2"></i> Theme
        </label>
        <select
          id="theme"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="auto">Auto (System Preference)</option>
        </select>
      </div>

      <!-- Language -->
      <div class="form-group">
        <label for="language" class="flex items-center">
          <i class="fas fa-language mr-2"></i> Language
        </label>
        <select
          id="language"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>

      <!-- Timezone -->
      <div class="form-group">
        <label for="timezone" class="flex items-center">
          <i class="fas fa-clock mr-2"></i> Timezone
        </label>
        <select
          id="timezone"
          class="focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="est">Eastern Time (ET)</option>
          <option value="cst">Central Time (CT)</option>
          <option value="mst">Mountain Time (MT)</option>
          <option value="pst">Pacific Time (PT)</option>
          <option value="ist">India Standard Time (IST)</option>
        </select>
      </div>

      <!-- Message Output -->
      <div id="message" class="message hidden" aria-live="polite"></div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 mt-6">
        <button
          type="submit"
          class="btn btn-primary flex-1"
        >
          <i class="fas fa-save mr-2"></i> Save Settings
        </button>
        
        <button
          type="button"
          onclick="resetForm()"
          class="btn bg-gray-600 text-white hover:bg-gray-700 flex-1"
        >
          <i class="fas fa-undo mr-2"></i> Reset
        </button>
      </div>
    </form>

    <!-- Back Button -->
    <div class="mt-8 text-center">
      <a
        href="admin_dashboard.html"
        class="btn btn-secondary"
      >
        <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
      </a>
    </div>
  </div>

  <!-- Script -->
  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const form = document.getElementById("settingsForm");
    const message = document.getElementById("message");

    // Save settings to backend
    async function saveSettingsToBackend(settings) {
      const formData = new FormData();
      formData.append('theme', settings.theme);
      formData.append('notifications', settings.notifications);
      formData.append('language', settings.language);
      formData.append('timezone', settings.timezone);

      const response = await fetch(`${API_BASE}/admin/settings`, {
        method: 'PUT',
        body: formData
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Failed to save settings');
      }

      return await response.json();
    }

    // Change password
    async function changePassword(newPassword, confirmPassword) {
      const formData = new FormData();
      formData.append('email', 'admin@example.com'); // Get from current admin
      formData.append('new_password', newPassword);
      formData.append('confirm_password', confirmPassword);

      const response = await fetch(`${API_BASE}/admin/reset-password`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Failed to change password');
      }

      return await response.json();
    }

    // Load settings from localStorage on page load
    window.addEventListener("DOMContentLoaded", () => {
      const storedSettings = JSON.parse(localStorage.getItem("adminSettings")) || {};

      if (storedSettings.notification) {
        document.getElementById("notification").value = storedSettings.notification;
      }

      if (storedSettings.theme) {
        document.getElementById("theme").value = storedSettings.theme;
      }

      if (storedSettings.language) {
        document.getElementById("language").value = storedSettings.language;
      }

      if (storedSettings.timezone) {
        document.getElementById("timezone").value = storedSettings.timezone;
      }

      // Apply theme if set
      applyTheme(storedSettings.theme);
    });

    // Handle form submission
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const notification = document.getElementById("notification").value;
      const theme = document.getElementById("theme").value;
      const language = document.getElementById("language").value;
      const timezone = document.getElementById("timezone").value;

      // Validate password if provided
      if (password) {
        if (password.length < 8) {
          showMessage("Password must be at least 8 characters long", "error");
          return;
        }

        if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
          showMessage("Password must contain uppercase, lowercase letters and numbers", "error");
          return;
        }

        if (password !== confirmPassword) {
          showMessage("Passwords do not match", "error");
          return;
        }
      }

      try {
        // Save settings to backend
        await saveSettingsToBackend({
          theme,
          notifications: notification !== 'none',
          language,
          timezone
        });

        // Handle password change if provided
        if (password) {
          await changePassword(password, confirmPassword);
        }

        // Save to localStorage for immediate use
        const settings = {
          notification,
          theme,
          language,
          timezone
        };

        localStorage.setItem("adminSettings", JSON.stringify(settings));
        localStorage.setItem("adminTheme", theme);
        
        // Apply theme immediately
        applyTheme(theme);

        showMessage("Settings saved successfully!", "success");
        
        // Clear password fields
        document.getElementById("password").value = "";
        document.getElementById("confirmPassword").value = "";
      } catch (error) {
        console.error('Settings save error:', error);
        showMessage("Failed to save settings: " + error.message, "error");
      }
    });

    // Show message function
    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
      message.classList.remove("hidden");
      
      setTimeout(() => {
        message.classList.add("hidden");
      }, 5000);
    }

    // Reset form function
    function resetForm() {
      form.reset();
      showMessage("Form has been reset", "success");
    }

    // Apply theme function
    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-mode');
      } else if (theme === 'light') {
        document.body.classList.remove('dark-mode');
      } else if (theme === 'auto') {
        // Auto theme based on system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      }
    }

    // Listen for system theme changes
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        const settings = JSON.parse(localStorage.getItem("adminSettings")) || {};
        if (settings.theme === 'auto') {
          applyTheme('auto');
        }
      });
    }
  </script>
</body>
</html>
