<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- Custom CSS (Optional) -->
<link href="./css/style.css" rel="stylesheet"/>
  <style>
    .reset-step {
      transition: all 0.3s ease;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .alert {
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      border: 1px solid transparent;
    }
    
    .alert-success {
      background-color: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }
    
    .alert-danger {
      background-color: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }
    
    .alert-info {
      background-color: #d1ecf1;
      border-color: #bee5eb;
      color: #0c5460;
    }
    
    .btn-outline-danger {
      color: #dc3545;
      border-color: #dc3545;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-outline-danger:hover {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="name fs-4 fw-bold mb-3">RESET PASSWORD</div>

    <!-- Logo -->
    <div class="log-img">
      <img src="./assets/images/logo.png" alt="Dream Route company logo" />
    </div>

    <!-- Dark Mode Toggle -->
    <div class="dark-mode-toggle-wrapper">
      <button id="darkModeToggle" title="Toggle dark mode">🌙</button>
    </div>

    <!-- Step 1: Request Reset -->
    <div id="step1" class="reset-step">
      <p class="text-center mb-3">Enter your email to receive reset instructions</p>
      <form id="requestResetForm" onsubmit="event.preventDefault(); requestPasswordReset();">
        <div class="form-field">
          <span>📧</span>
          <input type="email" name="email" id="resetEmail" placeholder="Enter your email" required />
        </div>
        <div id="emailError" class="error-message" aria-live="polite"></div>
        
        <button type="submit" class="btn btn-primary w-100 mt-2" id="requestResetBtn">
          Send Reset Instructions
        </button>
      </form>
    </div>

    <!-- Step 2: Reset Password -->
    <div id="step2" class="reset-step" style="display: none;">
      <p class="text-center mb-3">Enter your new password</p>
      <form id="resetPasswordForm" onsubmit="event.preventDefault(); resetPassword();">
        <!-- Email (hidden but needed for API) -->
        <input type="hidden" id="hiddenEmail" />
        
        <!-- New Password -->
        <div class="form-field">
          <span>🔒</span>
          <input type="password" name="newpassword" id="newPassword" placeholder="New Password" required />
          <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</span>
        </div>

        <!-- Confirm Password -->
        <div class="form-field">
          <span>🔒</span>
          <input type="password" name="cfmpassword" id="confirmPassword" placeholder="Confirm Password" required />
          <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100 mt-2" id="resetPasswordBtn">
          Reset Password
        </button>
      </form>
    </div>

    <!-- Google Login Alternative -->
    <div class="text-center mt-3">
      <p class="text-muted">Or continue with:</p>
      <button onclick="loginWithGoogle()" class="btn btn-outline-danger w-100">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" width="20" height="20" />
        Continue with Google
      </button>
    </div>

    <!-- Message Output -->
    <div id="message" class="mt-3" aria-live="polite"></div>
  </div>

  <!-- JavaScript -->
  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    
    // Dark Mode Toggle
    const darkModeToggle = document.getElementById("darkModeToggle");
    darkModeToggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      darkModeToggle.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    });

    // Toggle Password Visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁️";
      }
    }

    // Step 1: Request Password Reset
    async function requestPasswordReset() {
      const email = document.getElementById("resetEmail").value.trim();
      const message = document.getElementById("message");
      const btn = document.getElementById("requestResetBtn");

      if (!email) {
        showMessage("❗ Please enter your email address.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const response = await fetch(`${API_BASE}/admin/forgot-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `email=${encodeURIComponent(email)}`
        });

        const result = await response.json();

        if (response.ok) {
          showMessage("✅ Reset instructions sent! You can now set your new password below.", "success");
          
          // Store the reset token for step 2
          if (result.reset_token) {
            sessionStorage.setItem('resetToken', result.reset_token);
          }
          
          // Show step 2 and hide step 1
          document.getElementById('step1').style.display = 'none';
          document.getElementById('step2').style.display = 'block';
          document.getElementById('hiddenEmail').value = email;
          
        } else {
          showMessage(`❗ ${result.detail || 'Failed to send reset email'}`, "error");
        }
      } catch (error) {
        console.error('Password reset request error:', error);
        showMessage("❗ Network error. Please check your connection.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Send Reset Instructions";
      }
    }

    // Step 2: Reset Password
    async function resetPassword() {
      const email = document.getElementById("hiddenEmail").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const btn = document.getElementById("resetPasswordBtn");

      if (!newPassword || !confirmPassword) {
        showMessage("❗ Please fill out all password fields.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("❗ Passwords do not match.", "error");
        return;
      }

      if (newPassword.length < 6) {
        showMessage("❗ Password must be at least 6 characters long.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Resetting...";

      try {
        // Get the reset token from session storage
        const resetToken = sessionStorage.getItem('resetToken') || '';
        
        const response = await fetch(`${API_BASE}/admin/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `email=${encodeURIComponent(email)}&new_password=${encodeURIComponent(newPassword)}&confirm_password=${encodeURIComponent(confirmPassword)}&token=${encodeURIComponent(resetToken)}`
        });

        const result = await response.json();

        if (response.ok) {
          showMessage("✅ Password reset successful! Redirecting to login...", "success");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } else {
          showMessage(`❗ ${result.detail || 'Failed to reset password'}`, "error");
        }
      } catch (error) {
        console.error('Password reset error:', error);
        showMessage("❗ Network error. Please check your connection.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Reset Password";
      }
    }

    // Google Login
    async function loginWithGoogle() {
      try {
        // This is a simulation - in production you would use Google's OAuth library
        showMessage("🔄 Connecting to Google...", "info");
        
        // Simulate Google OAuth token for admin user
        const googleToken = "admin_google_token_123";
        
        const response = await fetch(`${API_BASE}/admin/google-login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `google_token=${encodeURIComponent(googleToken)}`
        });

        const result = await response.json();

        if (response.ok) {
          showMessage("✅ Google login successful! Redirecting...", "success");
          
          // Store the access token
          localStorage.setItem('access_token', result.access_token);
          
          setTimeout(() => {
            window.location.href = "admin_dashboard.html";
          }, 1500);
        } else {
          showMessage(`❗ ${result.detail || 'Google login failed'}`, "error");
        }
      } catch (error) {
        console.error('Google login error:', error);
        showMessage("❗ Google login failed. Please try again.", "error");
      }
    }

    // Utility function to show messages
    function showMessage(text, type) {
      const message = document.getElementById("message");
      message.textContent = text;
      message.className = `mt-3 alert ${type === 'error' ? 'alert-danger' : type === 'success' ? 'alert-success' : 'alert-info'}`;
      message.style.display = 'block';
    }

    // Initialize
    console.log("🔐 Password Reset page loaded");
  </script>
</body>

</html>
