<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body class="bg-gradient-to-b from-blue-900 via-blue-400 to-blue-200 min-h-screen">
  <div class="flex min-h-screen">
    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay"
      class="fixed inset-0 bg-black/50 z-30 hidden opacity-0 transition-opacity duration-300 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
      class="fixed z-40 inset-y-0 left-0 transform lg:transform-none w-64 bg-black/40 backdrop-blur-md text-white transition-transform duration-300 ease-in-out -translate-x-full lg:translate-x-0">
      <div class="flex items-center gap-2 p-4 text-2xl font-bold border-b border-white/20">
        <i class="fas fa-tools text-white text-xl"></i>
        <span>Admin Panel</span>
      </div>

      <div class="flex justify-center py-6 border-b border-blue-600">
        <img src="./assets/images/logo.png" alt="Logo"
          class="w-28 h-28 rounded-full object-contain shadow-md border-2 border-white" />
      </div>

      <nav class="flex flex-col gap-1 p-3 flex-1 overflow-y-auto">
        <a href="admin_dashboard.html" class="flex items-center gap-3 px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-tachometer-alt"></i>Dashboard
        </a>
        <a href="manage-users.html" class="flex items-center gap-3 px-4 py-2 rounded bg-blue-700 font-semibold">
          <i class="fas fa-users"></i>Manage Users
        </a>
        <a href="quiz-editor.html" class="flex items-center gap-3 px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-pen"></i>Quiz Editor
        </a>
        <a href="resume-rules.html" class="flex items-center gap-3 px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-file-alt"></i>Resume Rules
        </a>
        <a href="user-quiz-attempts.html" class="flex items-center gap-3 px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-clipboard-list"></i>User Quiz Attempts
        </a>
        <a href="reports.html" class="flex items-center gap-3 px-4 py-2 rounded hover:bg-blue-700">
          <i class="fas fa-file"></i>Reports
        </a>
        <a href="login.html" class="flex items-center gap-3 px-4 py-2 rounded bg-red-600 hover:bg-red-700">
          <i class="fas fa-sign-out-alt"></i>Logout
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col responsive-padding ml-0 lg:ml-64 no-horizontal-scroll">
      <!-- Top Navbar -->
      <div class="flex items-center justify-between mb-6 bg-white rounded responsive-padding">
        <!-- Left Section: Hamburger + Title -->
        <div class="flex items-center gap-4">
          <button id="sidebarToggle" class="lg:hidden text-gray-700 text-2xl touch-friendly mobile-menu-btn">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="text-blue-800 text-2xl font-semibold py-4 responsive-title">
            Manage Users
          </h1>
        </div>

        <!-- Right Section: Profile Dropdown -->
        <div class="relative ml-auto">
          <button id="profileDropdownToggle"
            class="flex items-center gap-2 bg-blue-700 text-white px-4 py-2 rounded focus:outline-none hover:bg-blue-600">
            <div class="w-8 h-8 rounded-full overflow-hidden border-2 border-white">
              <img id="adminProfilePic" src="./assets/images/logo.png" alt="Admin" class="w-full h-full object-cover admin-profile-pic">
            </div>
            <span id="adminNameDisplay" class="hidden md:inline">Admin</span>
            <i class="fas fa-caret-down"></i>
          </button>
          <ul id="dropdownMenu"
            class="absolute right-0 mt-2 bg-white border rounded shadow-lg hidden z-10 w-40 text-sm">
            <li>
              <a class="block px-4 py-2 hover:bg-gray-100" href="profile.html">Profile</a>
            </li>
            <li>
              <a class="block px-4 py-2 hover:bg-gray-100" href="settings.html">Settings</a>
            </li>
            <li>
              <hr class="my-1" />
            </li>
            <li>
              <a class="block px-4 py-2 hover:bg-gray-100" href="login.html">Logout</a>
            </li>
          </ul>
        </div>
      </div>

      <!-- User Table -->
      <div class="bg-white responsive-padding rounded shadow">
        <!-- Filters -->
        <div class="search-container mb-4">
          <h3 class="text-lg font-semibold text-gray-700 flex items-center gap-2 responsive-title mb-4 sm:mb-0">
            <i class="fas fa-users"></i> Users List
          </h3>

          <div class="filter-buttons w-full flex flex-col sm:flex-row gap-3">
            <input type="text" id="searchInput" placeholder="Search by name or email..."
              class="flex-1 px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-400" />

            <select id="roleFilter"
              class="px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300 sm:w-40">
              <option value="">Filter by Role</option>
              <option value="Student">Student</option>
              <option value="Fresher">Fresher</option>
              <option value="Job-Seeker">Job Seeker</option>
              <option value="Admin">Admin</option>
            </select>

            <select id="statusFilter"
              class="px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300 sm:w-40">
              <option value="">Filter by Status</option>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <!-- Users Cards/Table -->
        <div class="bg-white rounded-lg shadow-sm overflow-hidden">
          <!-- Desktop Table View -->
          <div class="hidden md:block">
            <table class="w-full">
              <thead class="bg-gray-50 border-b">
                <tr>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">User Info</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Role & Status</th>
                  <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Joined</th>
                  <th class="px-6 py-4 text-center text-sm font-semibold text-gray-700">Actions</th>
                </tr>
              </thead>
              <tbody id="desktopTableBody" class="divide-y divide-gray-100">
                <!-- Desktop content populated by JS -->
              </tbody>
            </table>
          </div>

          <!-- Mobile Card View -->
          <div class="md:hidden">
            <div id="mobileCardsContainer" class="p-4 space-y-4">
              <!-- Mobile cards populated by JS -->
            </div>
          </div>
        </div>
        
        <!-- Pagination -->
        <div class="mt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
          <button class="btn-mobile bg-blue-500 text-white rounded hover:bg-blue-600 disabled:opacity-50 touch-friendly" disabled>
            <i class="fas fa-arrow-left mr-2"></i> Previous
          </button>

          <span class="text-sm text-gray-600 responsive-body">Page 1 of 5</span>

          <button class="btn-mobile bg-blue-500 text-white rounded hover:bg-blue-600 touch-friendly">
            Next <i class="fas fa-arrow-right ml-2"></i>
          </button>
        </div>
      </div>

      <!-- User Modal -->
      <div id="userModal" class="responsive-modal bg-black/50 hidden">
        <div class="modal-content">
          <div class="responsive-padding">
            <h2 id="modalTitle" class="text-xl font-semibold mb-4 responsive-title">User Info</h2>
            <form id="userForm" class="responsive-form">
              <input type="text" id="modalName" placeholder="Name" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400" />
              <input type="email" id="modalEmail" placeholder="Email" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400" />
              <input type="text" id="modalRole" placeholder="Role" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400" />
              <input type="text" id="modalStatus" placeholder="Status" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400" />
              <input type="text" id="modalResume" placeholder="Resume URL" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400" />
              <div class="btn-group-mobile mt-4">
                <button type="button" id="closeModal" class="btn-mobile bg-gray-300 rounded hover:bg-gray-400 touch-friendly">Close</button>
                <button type="submit" id="saveUser" class="btn-mobile bg-blue-600 text-white rounded hover:bg-blue-700 touch-friendly">Save</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      </div>
    </main>
  </div>

  <!-- JS -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  // Sidebar toggle
  // Sidebar toggle, overlay, and profile dropdown are handled by admin-common.js

  // Table elements
  const searchInput = document.getElementById("searchInput");
  const roleFilter = document.getElementById("roleFilter");
  const statusFilter = document.getElementById("statusFilter");
  const desktopTableBody = document.getElementById("desktopTableBody");
  const mobileCardsContainer = document.getElementById("mobileCardsContainer");
  const prevBtn = document.querySelector(".fa-arrow-left").closest("button");
  const nextBtn = document.querySelector(".fa-arrow-right").closest("button");
  const pageInfo = document.querySelector("span.text-sm");

  // Modal elements
  const userModal = document.getElementById("userModal");
  const modalTitle = document.getElementById("modalTitle");
  const modalName = document.getElementById("modalName");
  const modalEmail = document.getElementById("modalEmail");
  const modalRole = document.getElementById("modalRole");
  const modalStatus = document.getElementById("modalStatus");
  const modalResume = document.getElementById("modalResume");
  const closeModalBtn = document.getElementById("closeModal");

  let allRows = [];
  let filteredRows = [];
  let currentPage = 1;
  const rowsPerPage = 5;

  // No sample data - fetch from database only

  // ============================
  // Fetch users from API
  // ============================
  async function loadUsers() {
    try {
      const response = await fetch("http://127.0.0.1:8000/users");
      if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
      const users = await response.json();

      console.log("Fetched users from database:", users);

      if (!users || users.length === 0) {
        showEmptyState();
        return;
      }

      allRows = users.map(user => {
        // Create desktop row
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50 transition-colors";
        
        // Handle profile image - use API endpoint if available, otherwise fallback
        const profileImage = user.profile_picture || user.image_url || './assets/images/logo.png';
        
        // Handle resume link - prefer API endpoint for PDF viewing
        const resumeUrl = user.resume_api_url || user.resume_path || user.resume || '#';
        const hasResume = resumeUrl && resumeUrl !== '#' && resumeUrl !== '';
        
        // Handle email
        const userEmail = user.email || '';
        
        // Handle status and role
        const userStatus = user.status || 'Unknown';
        const userRole = user.role || 'user';
        
        // Format joined date
        const joinedDate = user.created_at || user.joined_date || new Date().toISOString();
        
        row.innerHTML = `
          <td class="px-6 py-4">
            <div class="flex items-center space-x-4">
              <img src="${profileImage}" alt="User" class="w-12 h-12 rounded-full object-cover border-2 border-gray-200" 
                   onerror="this.onerror=null; this.src='./assets/images/logo.png';" />
              <div>
                <div class="font-medium text-gray-900">${user.full_name || user.name || 'Unknown User'}</div>
                <div class="text-sm text-gray-500">${userEmail}</div>
                <div class="text-xs text-gray-400">ID: ${user.id || user.user_id || 'N/A'}</div>
              </div>
            </div>
          </td>
          <td class="px-6 py-4">
            <div class="space-y-2">
              <span class="inline-block px-3 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded-full capitalize">${userRole}</span>
              <div>
                <span class="inline-block px-3 py-1 text-xs font-medium bg-${userStatus.toLowerCase() === "active" ? "green" : "red"}-100 text-${userStatus.toLowerCase() === "active" ? "green" : "red"}-800 rounded-full">
                  ${userStatus}
                </span>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-500">
            ${new Date(joinedDate).toLocaleDateString()}
          </td>
          <td class="px-6 py-4 text-center">
            <div class="flex justify-center space-x-2">
              <button class="btn-view bg-blue-100 hover:bg-blue-200 text-blue-700 p-2 rounded-lg transition-colors" title="View User Details">
                <i class="fas fa-eye"></i>
              </button>
              ${hasResume ? `
                <a href="${resumeUrl}" target="_blank" class="bg-green-100 hover:bg-green-200 text-green-700 p-2 rounded-lg transition-colors" title="View Resume PDF" onclick="event.stopPropagation();">
                  <i class="fas fa-file-pdf"></i>
                </a>
              ` : `
                <button class="bg-gray-100 text-gray-400 p-2 rounded-lg cursor-not-allowed" title="No Resume Available" disabled>
                  <i class="fas fa-file-pdf"></i>
                </button>
              `}
              ${userEmail ? `
                <a href="mailto:${userEmail}" class="bg-purple-100 hover:bg-purple-200 text-purple-700 p-2 rounded-lg transition-colors" title="Send Email to ${userEmail}">
                  <i class="fas fa-envelope"></i>
                </a>
              ` : `
                <button class="bg-gray-100 text-gray-400 p-2 rounded-lg cursor-not-allowed" title="No Email Available" disabled>
                  <i class="fas fa-envelope"></i>
                </button>
              `}
            </div>
          </td>
        `;

        row.querySelector(".btn-view").addEventListener("click", () => openModal(user));
        return { desktop: row, user: user };
      });

      filteredRows = [...allRows];
      currentPage = 1;
      renderTable();
    } catch (err) {
      console.error("Error fetching users:", err);
      showErrorState();
    }
  }

  // ============================
  // Show empty state when no users
  // ============================
  function showEmptyState() {
    desktopTableBody.innerHTML = `
      <tr>
        <td colspan="4" class="px-6 py-12 text-center text-gray-500">
          <div class="flex flex-col items-center">
            <i class="fas fa-users text-4xl mb-4 text-gray-300"></i>
            <p class="text-lg font-medium mb-2">No Users Found</p>
            <p class="text-sm">No users are registered in the system yet.</p>
          </div>
        </td>
      </tr>
    `;
    mobileCardsContainer.innerHTML = `
      <div class="text-center py-12 text-gray-500">
        <i class="fas fa-users text-4xl mb-4 text-gray-300"></i>
        <p class="text-lg font-medium mb-2">No Users Found</p>
        <p class="text-sm">No users are registered in the system yet.</p>
      </div>
    `;
  }

  // ============================
  // Show error state when API fails
  // ============================
  function showErrorState() {
    desktopTableBody.innerHTML = `
      <tr>
        <td colspan="4" class="px-6 py-12 text-center text-red-500">
          <div class="flex flex-col items-center">
            <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-300"></i>
            <p class="text-lg font-medium mb-2">Error Loading Users</p>
            <p class="text-sm">Unable to fetch user data from the server.</p>
            <button onclick="loadUsers()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
              Retry
            </button>
          </div>
        </td>
      </tr>
    `;
    mobileCardsContainer.innerHTML = `
      <div class="text-center py-12 text-red-500">
        <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-300"></i>
        <p class="text-lg font-medium mb-2">Error Loading Users</p>
        <p class="text-sm">Unable to fetch user data from the server.</p>
        <button onclick="loadUsers()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
          Retry
        </button>
      </div>
    `;
  }

  // ============================
  // Render table + pagination
  // ============================
  function renderTable() {
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const currentItems = filteredRows.slice(start, end);

    // Clear existing content
    desktopTableBody.innerHTML = "";
    mobileCardsContainer.innerHTML = "";

    currentItems.forEach(item => {
      // Add to desktop table
      desktopTableBody.appendChild(item.desktop);
      
      // Create mobile card
      const user = item.user;
      const mobileCard = document.createElement("div");
      mobileCard.className = "bg-white border rounded-lg p-4 shadow-sm";
      
      // Handle data like desktop version
      const profileImage = user.profile_picture || user.image_url || './assets/images/logo.png';
      const resumeUrl = user.resume_api_url || user.resume_path || user.resume || '#';
      const hasResume = resumeUrl && resumeUrl !== '#' && resumeUrl !== '';
      const userEmail = user.email || '';
      const userStatus = user.status || 'Unknown';
      const userRole = user.role || 'user';
      const joinedDate = user.created_at || user.joined_date || new Date().toISOString();
      
      mobileCard.innerHTML = `
        <div class="flex items-start space-x-3">
          <img src="${profileImage}" alt="User" class="w-12 h-12 rounded-full object-cover border-2 border-gray-200" 
               onerror="this.onerror=null; this.src='./assets/images/logo.png';" />
          <div class="flex-1 min-w-0">
            <div class="font-medium text-gray-900">${user.full_name || user.name || 'Unknown User'}</div>
            <div class="text-sm text-gray-500">${userEmail}</div>
            <div class="text-xs text-gray-400 mt-1">ID: ${user.id || user.user_id || 'N/A'}</div>
            <div class="flex flex-wrap gap-2 mt-3">
              <span class="px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded-full capitalize">${userRole}</span>
              <span class="px-2 py-1 text-xs bg-${userStatus.toLowerCase() === "active" ? "green" : "red"}-100 text-${userStatus.toLowerCase() === "active" ? "green" : "red"}-800 rounded-full">${userStatus}</span>
            </div>
            <div class="text-xs text-gray-500 mt-2">Joined: ${new Date(joinedDate).toLocaleDateString()}</div>
            <div class="flex space-x-2 mt-3">
              <button class="mobile-view-btn bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs" title="View User">
                <i class="fas fa-eye mr-1"></i>View
              </button>
              ${hasResume ? `
                <a href="${resumeUrl}" target="_blank" class="bg-green-100 text-green-700 px-3 py-1 rounded text-xs" title="View Resume PDF" onclick="event.stopPropagation();">
                  <i class="fas fa-file-pdf mr-1"></i>Resume
                </a>
              ` : `
                <span class="bg-gray-100 text-gray-400 px-3 py-1 rounded text-xs cursor-not-allowed" title="No Resume">
                  <i class="fas fa-file-pdf mr-1"></i>Resume
                </span>
              `}
              ${userEmail ? `
                <a href="mailto:${userEmail}" class="bg-purple-100 text-purple-700 px-3 py-1 rounded text-xs" title="Send Email">
                  <i class="fas fa-envelope mr-1"></i>Email
                </a>
              ` : `
                <span class="bg-gray-100 text-gray-400 px-3 py-1 rounded text-xs cursor-not-allowed" title="No Email">
                  <i class="fas fa-envelope mr-1"></i>Email
                </span>
              `}
            </div>
          </div>
        </div>
      `;
      
      mobileCard.querySelector(".mobile-view-btn").addEventListener("click", () => openModal(user));
      mobileCardsContainer.appendChild(mobileCard);
    });

    const totalPages = Math.ceil(filteredRows.length / rowsPerPage) || 1;
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;
  }

  // ============================
  // Search + filters
  // ============================
  function filterRows() {
    const searchText = searchInput.value.toLowerCase();
    const selectedRole = roleFilter.value.toLowerCase();
    const selectedStatus = statusFilter.value.toLowerCase();

    filteredRows = allRows.filter(row => {
      const name = row.children[1].textContent.toLowerCase();
      const email = row.children[2].textContent.toLowerCase();
      const role = row.children[4].textContent.toLowerCase();
      const status = row.children[5].textContent.toLowerCase();

      const matchesSearch = name.includes(searchText) || email.includes(searchText);
      const matchesRole = !selectedRole || role === selectedRole;
      const matchesStatus = !selectedStatus || status === selectedStatus;

      return matchesSearch && matchesRole && matchesStatus;
    });
  }

  [searchInput, roleFilter, statusFilter].forEach(el =>
    el.addEventListener("input", () => {
      currentPage = 1;
      filterRows();
      renderTable();
    })
  );

  // ============================
  // Pagination buttons
  // ============================
  prevBtn.addEventListener("click", () => {
    if (currentPage > 1) {
      currentPage--;
      renderTable();
    }
  });

  nextBtn.addEventListener("click", () => {
    const totalPages = Math.ceil(filteredRows.length / rowsPerPage);
    if (currentPage < totalPages) {
      currentPage++;
      renderTable();
    }
  });

  // ============================
  // Modal functionality
  // ============================
  function openModal(user) {
    modalTitle.textContent = "View User Details";
    modalName.value = user.name;
    modalEmail.value = user.email;
    modalRole.value = user.role;
    modalStatus.value = user.status;
    modalResume.value = user.resume;

    [modalName, modalEmail, modalRole, modalStatus, modalResume].forEach(input => input.disabled = true);

    userModal.classList.remove("hidden");
  }

  closeModalBtn.addEventListener("click", () => {
    userModal.classList.add("hidden");
  });

  // Click outside modal to close
  userModal.addEventListener("click", (e) => {
    if (e.target === userModal) userModal.classList.add("hidden");
  });

  // ============================
  // Initial load
  // ============================
  loadUsers();
});
</script>


  <script src="js/admin-common.js"></script>
</body>

</html>
